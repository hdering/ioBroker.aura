name: Test and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-**'
  pull_request:
    branches:
      - main

# Cancel previous PR/branch runs when a new commit is pushed
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ioBroker/testing-action-check@v1
        with:
          node-version: '24.x'
          lint: true

  adapter-tests:
    needs: check-and-lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [22.x, 24.x]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6
      - uses: ioBroker/testing-action-adapter@v1
        with:
          node-version: ${{ matrix.node-version }}
          os: ${{ matrix.os }}

  deploy:
    needs: [check-and-lint, adapter-tests]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write
      contents: write

    steps:
      # For prereleases: snapshot the current "latest" npm tag BEFORE the deploy
      # action overwrites it. We restore it afterwards.
      # Pre-release tags contain a hyphen, e.g. v1.2.3-beta.0
      - name: Setup node (snapshot latest)
        if: contains(github.ref, '-')
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Snapshot current latest
        if: contains(github.ref, '-')
        id: snapshot
        run: echo "latest=$(npm view iobroker.aura dist-tags.latest 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ioBroker/testing-action-deploy@v1 always publishes with tag "latest",
      # ignoring the GitHub release prerelease flag. We fix the tags afterwards.
      - uses: ioBroker/testing-action-deploy@v1
        with:
          node-version: '24.x'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          build: 'true'
          build-command: 'npm run build:adapter'

      - name: Setup node (fix tags)
        if: contains(github.ref, '-')
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Fix npm tags — move to beta, restore latest
        if: contains(github.ref, '-')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          PREV_LATEST="${{ steps.snapshot.outputs.latest }}"

          npm dist-tag add iobroker.aura@${VERSION} beta
          echo "Set beta → $VERSION"

          if [ -n "$PREV_LATEST" ] && [ "$PREV_LATEST" != "$VERSION" ]; then
            npm dist-tag add iobroker.aura@${PREV_LATEST} latest
            echo "Restored latest → $PREV_LATEST"
          else
            echo "No previous latest to restore (was: $PREV_LATEST)"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
