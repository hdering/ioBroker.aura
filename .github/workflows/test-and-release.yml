name: Test and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-**'
  pull_request:
    branches:
      - main

# Cancel previous PR/branch runs when a new commit is pushed
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ioBroker/testing-action-check@v2
        with:
          node-version: '24.x'
          lint: true

  adapter-tests:
    needs: check-and-lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [22.x, 24.x]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v7
      - uses: ioBroker/testing-action-adapter@v1
        with:
          node-version: ${{ matrix.node-version }}
          os: ${{ matrix.os }}

  deploy:
    needs: [check-and-lint, adapter-tests]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write
      contents: write

    steps:
      # Idempotency guard: npm versions are immutable, so re-running a deploy
      # (manual re-run or a re-pushed tag) for an already-published version
      # fails the whole job with E403. Detect that case and skip the publish.
      - name: Setup node (npm check)
        uses: actions/setup-node@v7
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Check if version already published
        id: check
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if npm view iobroker.aura@"$VERSION" version > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::warning::iobroker.aura@$VERSION is already on npm — skipping publish (re-run / duplicate tag)"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # testing-action-deploy@v1 publishes via npm OIDC trusted publishing
      # (id-token: write — no NPM_TOKEN needed). It auto-tags prerelease
      # versions (hyphen, e.g. 0.9.229-beta.0) under the "next" dist-tag and
      # leaves "latest" on the stable release, so no manual dist-tag fixup is
      # required. Skipped when the version is already on npm (guard above).
      - uses: ioBroker/testing-action-deploy@v1
        if: steps.check.outputs.exists != 'true'
        with:
          node-version: '24.x'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          build: 'true'
          build-command: 'npm run build:adapter'
