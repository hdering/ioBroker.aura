name: Test and Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') }}

jobs:
  check-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ioBroker/testing-action-check@v1
        with:
          node-version: '20.x'
          lint: true

  adapter-tests:
    needs: check-and-lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [20.x, 22.x]
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6
      - uses: ioBroker/testing-action-adapter@v1
        with:
          node-version: ${{ matrix.node-version }}
          os: ${{ matrix.os }}

  deploy:
    needs: [check-and-lint, adapter-tests]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: ioBroker/testing-action-deploy@v1
        with:
          node-version: '20.x'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          build: 'true'
          build-command: 'npm run build:adapter'
          install-command: 'npm ci --legacy-peer-deps'

      # ioBroker/testing-action-deploy@v1 always publishes with tag "latest",
      # ignoring the GitHub release prerelease flag. This step fixes npm tags:
      # - prerelease → move to "beta", restore "latest" to last stable
      # - stable     → already on "latest" (correct, nothing to do)
      - name: Fix npm dist-tag for prerelease
        if: github.event.release.prerelease == true
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Move prerelease from latest → beta
        if: github.event.release.prerelease == true
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"

          # Tag the new version as beta
          npm dist-tag add iobroker.aura@${VERSION} beta
          echo "Set beta → $VERSION"

          # Find last stable version from GitHub releases (authoritative source for prerelease flag)
          STABLE=$(gh release list --repo "${{ github.repository }}" --limit 50 --json tagName,isPrerelease \
            | node -e "
              const releases = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              const cur = process.env.VERSION;
              const found = releases.find(r => !r.isPrerelease && r.tagName !== 'v'+cur);
              console.log(found ? found.tagName.replace(/^v/,'') : '');
            " VERSION="$VERSION")

          if [ -n "$STABLE" ]; then
            npm dist-tag add iobroker.aura@${STABLE} latest
            echo "Restored latest → $STABLE"
          else
            echo "No stable release found, skipping latest restore"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
