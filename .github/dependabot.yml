version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # React 19 migration is a deliberate, coupled effort (react + react-dom +
      # types + the bundled lib chain). Block all React major bumps; 18.x
      # minor/patch updates still flow through.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      # Vite major bumps (5→6→7→8) are breaking and need a deliberate
      # migration; block them. Minor/patch updates still flow through.
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
