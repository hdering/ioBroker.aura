name: Bug report
description: Report a problem with the Aura dashboard
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem. Drag & drop screenshots here — they help a lot.
    validations:
      required: true

  - type: textarea
    id: widget-export
    attributes:
      label: Widget export
      description: >
        If the problem is about a specific widget, export it
        (widget menu → Export) and paste the JSON here.
      render: json
    validations:
      required: false

  - type: input
    id: aura-version
    attributes:
      label: Aura version
      placeholder: e.g. 0.11.1
    validations:
      required: false
