    <style>
      #aura-boot {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 16px;
        background: #0f172a; color: #94a3b8;
        font-family: system-ui, sans-serif; font-size: 13px;
        z-index: 9999;
        transition: opacity 0.25s ease-out;
      }
      #aura-boot.hidden { opacity: 0; pointer-events: none; }
      #aura-boot-bar-wrap {
        position: absolute; top: 0; left: 0; right: 0; height: 2px;
        background: rgba(255,255,255,0.08);
      }
      #aura-boot-bar {
        height: 100%; background: #6366f1;
        animation: aura-slide 1.4s ease-in-out infinite;
      }
      #aura-boot-spinner {
        width: 28px; height: 28px; border-radius: 50%;
        border: 2px solid #6366f1; border-top-color: transparent;
        animation: aura-spin 0.7s linear infinite;
      }
      @keyframes aura-slide {
        0%   { transform: translateX(-100%) scaleX(0.3); }
        50%  { transform: translateX(0%)    scaleX(0.7); }
        100% { transform: translateX(100%) scaleX(0.3); }
      }
      @keyframes aura-spin {
        to { transform: rotate(360deg); }
      }
    </style>
